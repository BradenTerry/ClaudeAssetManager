name: CI

# Runs the test suite on every pull request targeting main. Merges to main are not re-tested
# here -- the PR already ran this suite, and the release workflow re-runs it on the tagged commit
# before publishing, so that step is the actual release gate.
on:
  pull_request:
    branches: [main]

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    # Delete and other fs commands behave differently per OS (Windows file locks,
    # Recycle Bin, case-insensitive paths), so run the suite on all three.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test
