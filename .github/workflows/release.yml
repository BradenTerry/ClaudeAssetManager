name: Release

# Runs when you publish a GitHub Release (create it manually in the GitHub UI /
# the VS Code GitHub integration). Bump "version" in package.json first and tag the
# release to match (e.g. v0.2.0). The job tests, packages the extension, attaches the
# .vsix to the release, and publishes to the VS Code Marketplace when VSCE_PAT is set.
on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Package extension
        run: npx --yes @vscode/vsce package --out claude-asset-manager.vsix

      - name: Attach .vsix to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" claude-asset-manager.vsix --clobber

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --packagePath claude-asset-manager.vsix -p "$VSCE_PAT"
