name: CI

# Runs the test suite on every pull request targeting main and on pushes to main.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm test
