name: Release

# Runs when you push a version tag (e.g. v0.2.0) to a commit on main. The tag is the
# single source of truth for the version: it is injected into package.json at build
# time (the committed "version" is just a placeholder and is never edited by hand).
# The job tests, packages the extension, creates the GitHub Release with auto-generated
# notes and the .vsix attached, and publishes to the VS Code Marketplace when VSCE_PAT
# is set.
#
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Run bundled JavaScript actions on Node 24 (Node 20 action runtime is deprecated).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - run: npm ci

      - run: npm test

      - name: Package extension
        run: npx --yes @vscode/vsce package --readme-path MARKETPLACE.md --out claude-asset-manager.vsix

      - name: Create GitHub Release with .vsix
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" claude-asset-manager.vsix --title "$GITHUB_REF_NAME" --generate-notes

      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        run: npx --yes @vscode/vsce publish --packagePath claude-asset-manager.vsix -p "$VSCE_PAT"
